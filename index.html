<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KARI4D</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:#000;
    overflow-x:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Background Premium */
body::before{
    content:'';
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at center,
    rgba(255,215,0,.15),
    transparent 60%),
    repeating-radial-gradient(circle,
    rgba(255,215,0,.08) 0px,
    rgba(255,215,0,.08) 1px,
    transparent 2px,
    transparent 18px);
    z-index:-1;
}

.container{
    width:95%;
    max-width:500px;
    text-align:center;
    padding:20px;
}

/* Logo */
.logo{
    font-size:42px;
    font-weight:900;
    text-transform:uppercase;
    background:linear-gradient(
    180deg,
    #fff8d6 0%,
    #ffd700 30%,
    #ffb300 60%,
    #7a4f00 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:
    0 0 10px #ffd700,
    0 0 30px #ffb300,
    0 0 50px #ff8c00;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        filter:brightness(1);
    }
    to{
        filter:brightness(1.5);
    }
}

/* Typing Effect */
.typing{
    width:100%;
    margin:15px auto;
    overflow:hidden;
    white-space:nowrap;
    border-right:3px solid gold;
    color:#fff;
    font-size:18px;
    font-weight:600;
    animation:
    typing 5s steps(40,end) infinite,
    blink .8s infinite;
}

@keyframes typing{
    0%{width:0}
    50%{width:100%}
    90%{width:100%}
    100%{width:0}
}

@keyframes blink{
    50%{
        border-color:transparent;
    }
}

/* Running Text */
.marquee{
    width:100%;
    overflow:hidden;
    margin:15px 0;
}

.marquee span{
    display:inline-block;
    white-space:nowrap;
    color:#ffd700;
    font-weight:bold;
    animation:marquee 15s linear infinite;
}

@keyframes marquee{
    from{
        transform:translateX(100%);
    }
    to{
        transform:translateX(-100%);
    }
}

/* Banner */
.banner{
    position:relative;
    border-radius:25px;
    overflow:hidden;
    border:2px solid rgba(255,215,0,.7);
    box-shadow:
    0 0 20px rgba(255,215,0,.5),
    0 0 60px rgba(255,180,0,.3);
    transition:.5s;
}

.banner:hover{
    transform:translateY(-8px) scale(1.02);
}

.banner img{
    width:100%;
    display:block;
}

/* Shine Effect */
.banner::before{
    content:'';
    position:absolute;
    top:0;
    left:-100%;
    width:60%;
    height:100%;
    background:linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,.4),
    transparent);
    animation:shine 4s infinite;
}

@keyframes shine{
    100%{
        left:150%;
    }
}

/* Button */
.btn{
    display:block;
    text-decoration:none;
    margin-top:18px;
    padding:18px;
    font-size:30px;
    font-weight:900;
    border-radius:18px;
    color:#000;
    background:linear-gradient(
    180deg,
    #fff6c0,
    #ffd700,
    #c98a00);
    box-shadow:
    0 0 20px rgba(255,215,0,.5),
    inset 0 2px 5px rgba(255,255,255,.7);
    transition:.4s;
    position:relative;
    overflow:hidden;
}

.btn:hover{
    transform:translateY(-4px);
    box-shadow:
    0 0 35px gold,
    0 0 60px orange;
}

.btn::before{
    content:'';
    position:absolute;
    top:0;
    left:-100%;
    width:50%;
    height:100%;
    background:rgba(255,255,255,.4);
    transform:skewX(-30deg);
    animation:btnshine 3s infinite;
}

@keyframes btnshine{
    100%{
        left:180%;
    }
}

/* Footer */
.footer{
    margin-top:20px;
    color:#999;
    font-size:12px;
    font-style: bold;
}

</style>
</head>
<body>

<div class="container">

    <div class="logo">KARI4D </div>

    <div class="typing">
        Selamat Datang di Situs KARI4D !
    </div>

    <div class="marquee">
        <span>
        🔥 Bonus Melimpah • Deposit Cepat • Withdraw Kilat • Pelayanan 24 Jam • Jackpot Setiap Hari 🔥
        </span>
    </div>

    <div class="banner">
        <img src="kapal.jpg" alt="Banner">
    </div>

    <a href="https://ganglembu.org/joyq" class="btn">MASUK</a>

    <a href="https://ganglembu.org/joyq" class="btn">DAFTAR</a>

    <div class="footer">
        © 2026 KARI4D - 𝐊𝐈𝐁𝐎𝐖𝐖
    </div>

</div>

</body>
</html>
